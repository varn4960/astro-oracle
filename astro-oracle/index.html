<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Oracle ✨ — ur cosmic bestie</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07071a;
      --surface:  #0e0e28;
      --card:     #12122e;
      --card2:    #16163a;
      --border:   rgba(120,80,255,0.18);
      --border2:  rgba(120,80,255,0.32);
      --accent:   #a855f7;
      --accent2:  #7c3aed;
      --pink:     #ec4899;
      --cyan:     #06b6d4;
      --yellow:   #eab308;
      --green:    #22c55e;
      --orange:   #f97316;
      --text:     #ede9fe;
      --muted:    #7c6ea8;
      --glow:     rgba(168,85,247,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── STARS BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(120,40,200,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(30,80,200,0.10) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    #stars {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: #fff; opacity: 0;
      animation: twinkle var(--d) var(--delay) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50%      { opacity: var(--op); transform: scale(1); }
    }

    /* ── LAYOUT ── */
    #app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(7,7,26,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.6rem; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); letter-spacing: 0.5px; }
    .logo-sub  { font-size: 0.65rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* ── SCREENS ── */
    .screen { width: 100%; max-width: 640px; padding: 32px 20px 60px; }
    #screen-home   { display: flex; }
    #screen-result { display: none; flex-direction: column; }

    /* ── HERO ── */
    .hero { text-align: center; margin-bottom: 40px; }
    .hero-orb {
      width: 110px; height: 110px; margin: 0 auto 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c084fc, #7c3aed, #2e1065);
      box-shadow: 0 0 60px rgba(168,85,247,0.5), 0 0 120px rgba(168,85,247,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      animation: pulse-orb 4s ease-in-out infinite;
    }
    @keyframes pulse-orb {
      0%,100% { box-shadow: 0 0 60px rgba(168,85,247,0.5), 0 0 120px rgba(168,85,247,0.2); transform: scale(1); }
      50%      { box-shadow: 0 0 80px rgba(168,85,247,0.7), 0 0 160px rgba(168,85,247,0.3); transform: scale(1.04); }
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      background: linear-gradient(135deg, #c084fc, #a855f7, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.2; margin-bottom: 10px;
    }
    .hero p { font-size: 0.95rem; color: var(--muted); line-height: 1.6; max-width: 360px; margin: 0 auto; }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
    }

    .form-heading { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; text-align: center; }

    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .field label { font-size: 0.72rem; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .optional { font-size: 0.65rem; background: rgba(168,85,247,0.15); color: var(--accent); padding: 2px 8px; border-radius: 8px; font-weight: 500; letter-spacing: 0; text-transform: none; }

    .field input, .field select {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 100%;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: rgba(168,85,247,0.07);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
    }
    .field input::placeholder { color: rgba(124,110,168,0.6); }
    .field input[type="date"]::-webkit-calendar-picker-indicator,
    .field input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) hue-rotate(240deg); }
    .field select option { background: #1a1040; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .cta-btn {
      width: 100%; margin-top: 8px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent2), var(--accent), #c084fc);
      border: none; border-radius: 16px;
      color: #fff; font-size: 1rem; font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer; letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(168,85,247,0.4);
      position: relative; overflow: hidden;
    }
    .cta-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }
    .cta-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(168,85,247,0.55); }
    .cta-btn:active { transform: translateY(0); }

    .form-footer { text-align: center; font-size: 0.72rem; color: var(--muted); margin-top: 14px; }

    /* ── RESULT SCREEN ── */

    /* PROFILE BANNER */
    .profile-banner {
      background: linear-gradient(160deg, #0e0a30, #150d3a, #0a1530);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 4px;
      position: relative; overflow: hidden;
    }
    .profile-banner::before {
      content: '';
      position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.18), transparent 70%);
      pointer-events: none;
    }
    .pb-emoji { font-size: 4rem; line-height: 1; margin-bottom: 8px; position: relative; z-index: 1; }
    .pb-name  { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--accent); }
    .pb-sign  { font-size: 0.8rem; color: var(--muted); margin: 4px 0 14px; }
    .pb-tags  { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .ptag {
      font-size: 0.7rem; font-weight: 600; padding: 5px 13px; border-radius: 20px;
      border: 1px solid; letter-spacing: 0.3px;
    }
    .ptag.fire   { color: var(--orange); border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.1); }
    .ptag.earth  { color: var(--green);  border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.1);  }
    .ptag.air    { color: var(--cyan);   border-color: rgba(6,182,212,0.3);  background: rgba(6,182,212,0.1);  }
    .ptag.water  { color: #818cf8;       border-color: rgba(129,140,248,0.3);background: rgba(129,140,248,0.1);}
    .ptag.planet { color: var(--accent); border-color: rgba(168,85,247,0.3); background: rgba(168,85,247,0.1); }
    .ptag.moon   { color: #c084fc;       border-color: rgba(192,132,252,0.3);background: rgba(192,132,252,0.1);}
    .ptag.rising { color: var(--cyan);   border-color: rgba(6,182,212,0.3);  background: rgba(6,182,212,0.1);  }
    .pb-vibe { font-size: 0.78rem; color: var(--muted); margin-top: 12px; font-style: italic; }

    /* TABS */
    .tabs-wrap {
      position: sticky; top: 57px; z-index: 50;
      background: rgba(7,7,26,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      margin: 0 -20px; padding: 0 20px;
    }
    .tabs { display: flex; overflow-x: auto; gap: 2px; padding: 6px 0; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; padding: 9px 16px; border-radius: 10px;
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 0.8rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .tab-btn.active { color: var(--accent); background: rgba(168,85,247,0.12); }

    /* PANELS */
    .panel { display: none; flex-direction: column; gap: 14px; padding-top: 20px; }
    .panel.active { display: flex; }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      animation: fadeUp 0.4s ease forwards;
    }
    .card.glow { box-shadow: 0 0 30px var(--glow); border-color: var(--border2); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }

    /* SCORE RING */
    .score-section { display: flex; align-items: center; gap: 20px; }
    .score-ring-wrap { flex-shrink: 0; position: relative; width: 80px; height: 80px; }
    .score-ring-wrap svg { transform: rotate(-90deg); }
    .score-ring-val {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 800; color: var(--accent);
      line-height: 1;
    }
    .score-ring-val span { font-size: 0.6rem; color: var(--muted); font-weight: 400; }

    /* VIBE BARS */
    .vbar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
    .vbar-label { font-size: 0.78rem; color: var(--muted); width: 80px; flex-shrink: 0; }
    .vbar-track { flex: 1; height: 7px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; }
    .vbar-fill  { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(.4,0,.2,1); }
    .vbar-pct   { font-size: 0.72rem; color: var(--muted); width: 32px; text-align: right; }

    /* BIG 3 */
    .big3-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .big3-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 10px; text-align: center;
    }
    .big3-icon  { font-size: 1.6rem; margin-bottom: 4px; }
    .big3-role  { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .big3-val   { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .big3-desc  { font-size: 0.68rem; color: var(--muted); margin-top: 3px; line-height: 1.3; }

    /* TRAITS */
    .traits-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .trait-chip {
      font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 20px;
      background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25); color: #c084fc;
    }

    /* PREDICTION BLOCKS */
    .pred-block {
      border-radius: 14px; padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--accent);
      margin-bottom: 2px;
    }
    .pred-block-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
    }
    .pred-block p { font-size: 0.88rem; line-height: 1.65; color: var(--text); }

    /* MONTH GRID */
    .month-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    @media(max-width:400px) { .month-grid { grid-template-columns: repeat(3,1fr); } }
    .month-tile {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 6px; text-align: center;
      cursor: pointer; transition: border-color 0.2s, transform 0.15s, background 0.2s;
    }
    .month-tile:hover  { border-color: var(--border2); transform: translateY(-2px); }
    .month-tile.active { border-color: var(--accent); background: rgba(168,85,247,0.1); }
    .month-tile .mt-name  { font-size: 0.7rem; font-weight: 700; color: var(--muted); }
    .month-tile .mt-emoji { font-size: 1.5rem; margin: 4px 0; }
    .month-tile .mt-score { font-size: 0.65rem; font-weight: 700; color: var(--accent); }
    .month-detail { margin-top: 2px; }

    /* DAILY STATS */
    .daily-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat-box {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 10px; text-align: center;
    }
    .stat-box .sb-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .stat-box .sb-val   { font-size: 1.4rem; font-weight: 800; }
    .stat-box .sb-sub   { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    /* MANTRA */
    .mantra-card {
      background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(99,102,241,0.1));
      border: 1px solid var(--border2);
      border-radius: 20px; padding: 22px;
      text-align: center;
    }
    .mantra-card .mantra-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
    .mantra-card .mantra-text  { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-style: italic; color: var(--pink); line-height: 1.5; }

    /* CHAT */
    .chat-wrap { display: flex; flex-direction: column; }
    #chat-log {
      height: 340px; overflow-y: auto; display: flex; flex-direction: column;
      gap: 10px; padding: 4px 2px; margin-bottom: 12px;
    }
    #chat-log::-webkit-scrollbar { width: 4px; }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
    #chat-log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    .cmsg { display: flex; gap: 8px; align-items: flex-end; }
    .cmsg.user { flex-direction: row-reverse; }
    .cmsg-av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--card2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
    }
    .cmsg-bubble {
      max-width: 82%; padding: 10px 14px; border-radius: 18px;
      font-size: 0.87rem; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }
    .cmsg.bot  .cmsg-bubble { background: var(--card2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .cmsg.user .cmsg-bubble { background: rgba(99,102,241,0.25); border: 1px solid rgba(99,102,241,0.35); border-bottom-right-radius: 4px; }
    .typing { display: flex; gap: 4px; padding: 4px 2px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)} }

    .quick-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
    .chip {
      font-size: 0.73rem; font-weight: 500; padding: 6px 13px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif;
      transition: border-color .2s, color .2s, background .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,85,247,0.08); }

    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 14px; padding: 11px 16px; color: var(--text);
      font-size: 0.87rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .chat-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(168,85,247,.1); }
    .chat-input-row input::placeholder { color: rgba(124,110,168,.5); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none; cursor: pointer; font-size: 1rem; color: #fff;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(168,85,247,.35);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(168,85,247,.5); }

    /* RESET */
    .reset-row { display: flex; justify-content: center; padding-top: 12px; }
    .reset-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); padding: 8px 20px; font-size: 0.78rem;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: border-color .2s, color .2s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* UTILS */
    .hl  { color: var(--pink);   font-weight: 600; }
    .hl2 { color: var(--cyan);   font-weight: 600; }
    .hl3 { color: var(--yellow); font-weight: 600; }
    .hl4 { color: var(--green);  font-weight: 600; }

    @media(max-width:480px) {
      .form-card { padding: 24px 18px; }
      .field-row { grid-template-columns: 1fr; }
      .big3-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Stars -->
<div id="stars"></div>

<div id="app">
  <header>
    <div class="logo">
      <span class="logo-icon">🔮</span>
      <div>
        <div class="logo-text">Astro Oracle</div>
        <div class="logo-sub">ur cosmic bestie</div>
      </div>
    </div>
  </header>

  <!-- ── HOME SCREEN ── -->
  <div class="screen" id="screen-home">
    <div style="width:100%">
      <div class="hero">
        <div class="hero-orb">✨</div>
        <h1>What do the stars say about you?</h1>
        <p>drop ur birth deets and we'll map ur whole cosmic blueprint — daily vibes, yearly predictions, love, career, and more</p>
      </div>

      <div class="form-card">
        <div class="form-heading">🌙 create ur cosmic profile</div>

        <div class="field">
          <label>Your Name</label>
          <input id="f-name" type="text" placeholder="what do the stars call you?" />
        </div>

        <div class="field-row">
          <div class="field">
            <label>Birthday</label>
            <input id="f-date" type="date" />
          </div>
          <div class="field">
            <label>Birth Time <span class="optional">optional</span></label>
            <input id="f-time" type="time" />
          </div>
        </div>

        <div class="field">
          <label>Place of Birth</label>
          <input id="f-place" type="text" placeholder="city, country" />
        </div>

        <div class="field">
          <label>Pronouns</label>
          <select id="f-gender">
            <option value="they">they / them</option>
            <option value="she">she / her</option>
            <option value="he">he / him</option>
          </select>
        </div>

        <button class="cta-btn" onclick="generate()">✨ reveal my cosmic blueprint</button>
        <div class="form-footer">🔒 everything stays in ur browser — no data is saved anywhere</div>
      </div>
    </div>
  </div>

  <!-- ── RESULT SCREEN ── -->
  <div class="screen" id="screen-result">

    <div class="profile-banner" id="profile-banner"></div>

    <div class="tabs-wrap">
      <div class="tabs">

function sr() { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; }

function si(lo,hi){ return Math.floor(sr()*(hi-lo+1))+lo; }

function getSign(d){
  const m=d.getMonth()+1,day=d.getDate();
  if((m===3&&day>=21)||(m===4&&day<=19))return'aries';
  if((m===4&&day>=20)||(m===5&&day<=20))return'taurus';
  if((m===5&&day>=21)||(m===6&&day<=20))return'gemini';
  if((m===6&&day>=21)||(m===7&&day<=22))return'cancer';
  if((m===7&&day>=23)||(m===8&&day<=22))return'leo';
  if((m===8&&day>=23)||(m===9&&day<=22))return'virgo';
  if((m===9&&day>=23)||(m===10&&day<=22))return'libra';
  if((m===10&&day>=23)||(m===11&&day<=21))return'scorpio';
  if((m===11&&day>=22)||(m===12&&day<=21))return'sagittarius';
  if((m===12&&day>=22)||(m===1&&day<=19))return'capricorn';
  if((m===1&&day>=20)||(m===2&&day<=18))return'aquarius';
  return'pisces';
}
function getMoon(d){
  const ms=(d-(new Date('2000-01-06')))/86400000;
  return Object.keys(SIGNS)[((Math.floor((ms%29.5)/29.5*12))%12+12)%12];
}
function getRising(t){
  if(!t)return null;
  return Object.keys(SIGNS)[Math.floor(parseInt(t)/2)%12];

    <div class="pred-block"><div class="pred-block-label">💞 love today</div><p>${sc(L_VIBES)} — ${sc(['send the text','don\'t force it','ur energy speaks for itself','let ppl come to u'])} bestie</p></div>
    <div class="pred-block"><div class="pred-block-label">🚀 career today</div><p>${sc(C_VIBES)} — pick one thing and do it ridiculously well</p></div>
    <div class="pred-block"><div class="pred-block-label">💸 money today</div><p>${sc(M_VIBES)} — check ur bank app, knowledge is power</p></div>
    <div class="pred-block"><div class="pred-block-label">🧘 energy today</div><p>${sc(H_VIBES)} — hydrate + move ur body, it's free serotonin</p></div>`;
}

// ═══════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════
function buildChat(){
  document.getElementById('panel-chat').innerHTML=`
    <div class="card chat-wrap">
      <div class="card-label">💬 ask ur oracle anything</div>
      <div class="quick-chips">
        <button class="chip" onclick="cq('what should i do today?')">what should i do today?</button>
        <button class="chip" onclick="cq('am i in my villain era?')">villain era check?</button>
        <button class="chip" onclick="cq('tell me about my love life')">love life 💞</button>
        <button class="chip" onclick="cq('what\'s my biggest strength?')">my superpower?</button>
        <button class="chip" onclick="cq('mercury retrograde advice')">mercury retro ☿</button>
        <button class="chip" onclick="cq('who am i compatible with?')">compatibility 💞</button>
      </div>
      <div id="chat-log">
        <div class="cmsg bot">
          <div class="cmsg-av">🔮</div>
          <div class="cmsg-bubble">hey ${U.name} ✨ ur oracle is online. ask me anything about ur ${cap(U.sk)} energy — love, career, vibes, whatever. no gatekeeping here bestie 💜</div>
        </div>
      </div>
      <div class="chat-input-row">
        <input id="c-inp" type="text" placeholder="ask the oracle anything…" onkeydown="if(event.key==='Enter')cs()" />
        <button class="send-btn" onclick="cs()">➤</button>
      </div>
    </div>`;
}

function cq(t){ document.getElementById('c-inp').value=t; cs(); }

function cs(){
  const inp=document.getElementById('c-inp');
  const txt=inp.value.trim(); if(!txt)return;
  addMsg('user',txt); inp.value='';
  const log=document.getElementById('chat-log');
  const td=document.createElement('div'); td.className='cmsg bot'; td.id='td';
  td.innerHTML=`<div class="cmsg-av">🔮</div><div class="cmsg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  log.appendChild(td); log.scrollTop=log.scrollHeight;
  setTimeout(()=>{ document.getElementById('td')?.remove(); addMsg('bot',reply(txt)); },650+Math.random()*450);
}

function addMsg(role,html){
  const log=document.getElementById('chat-log');
  const d=document.createElement('div'); d.className=`cmsg ${role}`;
  d.innerHTML=`<div class="cmsg-av">${role==='bot'?'🔮':'👤'}</div><div class="cmsg-bubble">${html}</div>`;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}

function reply(txt){
  const t=txt.toLowerCase(), s=SIGNS[U.sk], name=U.name, sk=U.sk;
  if(/villain|dark|bad/.test(t)) return `ok bestie real talk — ${name} ur not in ur villain era, ur in ur <span class="hl">boundaries era</span>. ${cap(sk)} energy is just misunderstood when ur done being a pushover. ur literally choosing urself 💅`;
  if(/superpower|strength|good at|special/.test(t)) return `ur ${cap(sk)} superpower is <span class="hl">${sc(s.traits)}</span> and ur lowkey sleeping on it. ppl WISH they had ur ${sc(s.traits)} energy, no cap. lean in.`;
  if(/weak|flaw|bad|worst/.test(t)) return `okay so ${cap(sk)}s can be a lil <span class="hl">${sc(['extra','intense','avoidant','chaotic','stubborn','overthinking'])}</span> sometimes — but that's just the shadow side of ur biggest strength so it's literally fine bestie`;
  if(/love|crush|dating|relationship|situationship/.test(t)) return `ur love life as a ${cap(sk)}? ${sc(L_VIBES)} 💞 ${s.el==='fire'?'ur passion is ur biggest rizz but slow down a lil':s.el==='earth'?'ur loyalty is unmatched, stop wasting it':s.el==='air'?'ur charm is insane, make sure the connection has depth':'ur emotional intelligence is ur love superpower fr'}. communicate MORE, assume LESS.`;
  if(/career|job|work|money|bag|cash/.test(t)) return `${cap(sk)} in career mode is <span class="hl2">dangerous (in the best way)</span>. ${sc(C_VIBES)} 🚀 ur ${sc(s.traits)} energy is literally ur competitive advantage — stop dimming it.`;
  if(/today|should i|advice|help|what do/.test(t)) return `oracle says: <span class="hl">${sc(['do the scary thing','rest before u crash','say yes to the unexpected invite','trust that gut feeling u\'ve been ignoring','reach out to that person u\'ve been thinking about','finish one thing before starting new ones'])}</span>. ur ${cap(sk)} energy is aligned with action rn.`;
  if(/mercury|retrograde/.test(t)) return `mercury retro as a ${cap(sk)}: exes WILL appear, texts WILL misfire, plans WILL flop. ur game plan: <span class="hl">over-communicate</span>, back ur stuff up, don't sign anything major. DO use this time to revisit unfinished work — it actually slaps for reviews and revisions.`;
  if(/moon/.test(t)) return `ur moon in <span class="hl">${cap(U.mk)}</span> means ur inner emotional world is giving ${SIGNS[U.mk].vibe}. on the outside ur a ${cap(sk)} but inside? full ${cap(U.mk)} behavior when no one's watching 👀`;
  if(/rising|ascendant/.test(t)) return U.rk?`ur ${cap(U.rk)} rising is ur first-impression filter. ppl meet u and think ${SIGNS[U.rk].vibe} before they even get to ur actual ${cap(sk)} self. ur a plot twist bestie 🎭`:`add ur birth time to unlock ur rising sign! it's the vibe u project before ppl actually know u 👀`;
  if(/compat|match|who.*sign|sign.*who/.test(t)) return `${cap(sk)}s vibe best with signs that ${s.el==='fire'?'fan ur flames — air signs especially (Gemini, Libra, Aquarius)':s.el==='earth'?'nourish u — water signs fr (Cancer, Scorpio, Pisces)':s.el==='air'?'give u energy to work with — fire signs (Aries, Leo, Sag)':'give u stability — earth signs (Taurus, Virgo, Cap)'}. but any sign can work with communication and shared values.`;
  if(/hi|hello|hey|sup|yo/.test(t)) return `hey ${name}! 👋 oracle fully online. what's on ur mind?`;
  return sc([
    `the stars are cryptic on that one 🌙 try asking about love, career, ur moon sign, or today's energy`,
    `hmm let me consult the cosmos… okay the answer is: trust ur gut on this one ${name}. ur ${cap(sk)} instincts are literally never wrong.`,
    `not the oracle being stumped 😭 ask me about ur vibe, compatibility, mercury retro, or daily energy and i'll spill everything`,
  ]);
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function tab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="tab('${name}')"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

function reset(){
  document.getElementById('screen-home').style.display='flex';
  document.getElementById('screen-result').style.display='none';
  ['f-name','f-date','f-time','f-place'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===0));
  window.scrollTo(0,0);
}
</script>
</body>
</html>
